# Build the Vite site and upload dist/ to the cPanel host over FTPS (encrypted,
# TLS 1.3 — verified on this server) on every push to `main`.
#
# One-time setup:
#   1. cPanel -> FTP Accounts: create a dedicated account (e.g. deploy@ecaproject.eu)
#      with Directory = /home/meselig2/ecaproject.eu  (the subdomain document root).
#   2. Repo -> Settings -> Secrets and variables -> Actions, add three secrets:
#        FTP_SERVER    FTP hostname from cPanel "Configure FTP Client"
#                      (e.g. ftp.ecaproject.eu) — should match the TLS certificate
#        FTP_USERNAME  the FULL username incl. domain, e.g. deploy@ecaproject.eu
#        FTP_PASSWORD  its password
name: Deploy to cPanel (FTPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cpanel-ftps
  cancel-in-progress: true

jobs:
  ftps-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - name: Upload dist/ to cPanel over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps # explicit FTP over TLS on port 21
          port: 21
          local-dir: ./dist/
          # A dedicated FTP account jailed to /home/meselig2/ecaproject.eu lands
          # at its own root, so ./ = the subdomain docroot. If you instead use
          # the main account (meselig2), change this to ./ecaproject.eu/ .
          server-dir: ./
